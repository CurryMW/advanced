  <body>
    <script>
      const channel = new MessageChannel();
      channel.port1.onmessage = function (event) {
        // 接收port2发送的消息
        console.log(event.data);
      };
      // 发送消息到port1
      channel.port2.postMessage("Hello, world!");
    </script>
